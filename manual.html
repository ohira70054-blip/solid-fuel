<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備・機器取扱説明書</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 3000; color: white; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #22c55e; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #16a34a; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h3>認証</h3>
            <p>パスワードを入力してください</p>
            <input type="password" id="pass-input" placeholder="Password" autofocus>
            <button onclick="checkPassword()">Login</button>
            <p id="error-msg" style="color: #ef4444; display: none; margin-top: 15px;">パスワードが正しくありません</p>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div class="manual-wrapper">
            <aside class="toc-sidebar">
                <h3>目次</h3>
                <ul id="toc-list">
                    <li class="toc-item"><a href="#section1" class="toc-link">01. 設備図面(CAD)</a><div class="preview-popup">CADデータを保存できます。</div></li>
                    <li class="toc-item"><a href="#section2" class="toc-link">02. 取扱説明書</a><div class="preview-popup">PDFマニュアルを確認できます。</div></li>
                    <li class="toc-item"><a href="#section3" class="toc-link">03. 機器仕様</a><div class="preview-popup">スペック一覧を表示します。</div></li>
                </ul>
            </aside>
            <main class="manual-content">
                <section id="section1" class="manual-section">
                    <h2>01. 設備図面(CAD)</h2>
                    <a href="07_CAD図面/01_設備図面_CAD/01_配置図/01_配置図.jww" download class="download-btn">01_配置図.jww を保存</a>
                </section>
                <section id="section2" class="manual-section"><h2>02. 取扱説明書</h2><div class="dummy-space"></div></section>
                <section id="section3" class="manual-section"><h2>03. 機器仕様</h2><div class="dummy-space"></div></section>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
