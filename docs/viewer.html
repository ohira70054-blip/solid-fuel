<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>取扱説明書ビューア</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: #1e293b; border-bottom: 2px solid #22c55e; padding: 8px 15px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        #back-btn { background: #22c55e; color: white; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
        #doc-title { font-size: 0.95rem; font-weight: bold; color: #f1f5f9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        #page-info { font-size: 0.8rem; color: #94a3b8; white-space: nowrap; flex-shrink: 0; }
        #pdf-frame { flex: 1; width: 100%; border: none; background: white; }
        #loading { position: fixed; inset: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text { color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div id="loading-text">PDFを読み込み中...</div></div>
<div id="header">
    <button id="back-btn" onclick="history.back()">← 戻る</button>
    <div id="doc-title">読み込み中...</div>
    <div id="page-info"></div>
</div>
<iframe id="pdf-frame"></iframe>
<script>
    const params = new URLSearchParams(location.search);
    const pdfPath = params.get('pdf');
    const page = parseInt(params.get('page') || '1');
    const pdfName = pdfPath ? decodeURIComponent(pdfPath.split('/').pop()) : '';
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 768;
    const reloaded = params.get('reloaded') === '1';

    document.getElementById('doc-title').textContent = pdfName || 'ドキュメント';
    if (page > 1) {
        document.getElementById('page-info').textContent = page + ' ページ目から';
    }

    const frame = document.getElementById('pdf-frame');

    if (!pdfPath) {
        document.getElementById('loading').style.display = 'none';
    } else if (isMobile && !reloaded) {
        // スマホ1回目：まずPDFをpage=1で読み込んでからページジャンプ
        document.getElementById('loading-text').textContent = 'PDFを準備中...';
        frame.onload = function() {
            if (page > 1) {
                document.getElementById('loading').style.display = 'flex';
                document.getElementById('loading-text').textContent = page + 'ページ目に移動中...';
                setTimeout(() => {
                    // reloadedフラグ付きで再読み込み
                    const newUrl = location.href.replace('reloaded=0', '').replace('&reloaded=1', '') + '&reloaded=1';
                    frame.src = pdfPath + '#page=' + page;
                    setTimeout(() => {
                        document.getElementById('loading').style.display = 'none';
                    }, 1500);
                }, 800);
            } else {
                document.getElementById('loading').style.display = 'none';
            }
        };
        frame.src = pdfPath;
    } else {
        // PC または スマホ2回目：直接page指定で開く
        frame.onload = function() {
            document.getElementById('loading').style.display = 'none';
        };
        frame.src = pdfPath + '#page=' + page;
    }
</script>
</body>
</html>
