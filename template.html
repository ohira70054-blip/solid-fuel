<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>solid-fuel_docs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #22c55e; --bg: #f1f5f9; --header-bg: #ffffff; --text: #1e293b; --border: #cbd5e1; --btn-bg: #e2e8f0; }
        [data-theme="dark"] { --bg: #0f172a; --header-bg: #1e293b; --text: #f1f5f9; --border: #475569; --btn-bg: #334155; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        #login-screen { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; color: white; width: 280px; }
        
        /* 入力欄：自動補完の色（黄色）を消す設定も追加 */
        input#pass { 
            width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: none; 
            text-align: center; font-size: 1.2rem; box-sizing: border-box; outline: none; 
            background: #ffffff !important; color: #000 !important;
            -webkit-text-security: disc; /* 入力文字を黒丸にする（一部ブラウザ用） */
        }

        header { position: sticky; top: 0; background: var(--header-bg); border-bottom: 2px solid var(--primary); padding: 8px 12px; z-index: 1000; display: flex; align-items: center; gap: 10px; box-sizing: border-box; }
        .menu-toggle { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 1rem; flex-shrink: 0; }
        #search-input { flex: 1; min-width: 50px; padding: 8px 15px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text); outline: none; }
        .theme-toggle-btn { background: #f59e0b; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .container { display: flex; max-width: 1400px; margin: 0 auto; padding: 10px; gap: 10px; }
        .sidebar { width: 220px; position: sticky; top: 70px; height: calc(100vh - 80px); overflow-y: auto; flex-shrink: 0; }
        .nav-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; color: #64748b; cursor: pointer; border-radius: 6px; font-size: 0.85rem; margin-bottom: 2px; }
        .nav-item:hover { background: var(--btn-bg); color: var(--primary); }
        .nav-status { font-size: 0.65rem; padding: 2px 6px; background: #e2e8f0; border-radius: 4px; color: #64748b; font-weight: bold; }
        .side-fav-item { color: #f59e0b !important; font-weight: bold; border-left: 3px solid #f59e0b; border-radius: 0 6px 6px 0 !important; margin-bottom: 5px; }

        .help-section { margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border); }
        .help-title { font-weight: bold; color: var(--primary); font-size: 0.9rem; margin-bottom: 8px; }
        .help-text { font-size: 0.75rem; color: #64748b; line-height: 1.6; }

        .main-content { flex: 1; min-width: 0; }
        .section-card { background: var(--header-bg); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .file-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
        .file-item { background: var(--bg); padding: 8px; border-radius: 6px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); }
        .file-item a { text-decoration: none; color: var(--text); font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

        /* ダウンロード中オーバーレイ */
        #dl-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99999; align-items: center; justify-content: center; }
        #dl-overlay.active { display: flex; }
        .dl-card { background: #1e293b; color: white; padding: 30px 40px; border-radius: 12px; text-align: center; }
        .dl-card .dl-filename { font-size: 0.85rem; color: #94a3b8; margin-top: 8px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dl-spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ホバープレビュー */
        #preview-popup { position: fixed; z-index: 9000; pointer-events: none; display: none; background: var(--header-bg); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); padding: 8px; width: 200px; }
        #preview-popup canvas { display: block; width: 100%; border-radius: 4px; }
        #preview-popup .preview-name { font-size: 0.72rem; color: #64748b; margin-top: 6px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #preview-popup .preview-no { font-size: 0.75rem; color: #94a3b8; text-align: center; padding: 20px 0; }

        /* NEWバッジ */
        .badge-new { font-size: 9px; background: #ef4444; color: white; padding: 2px 5px; border-radius: 4px; font-weight: bold; flex-shrink: 0; animation: pulse-new 1.5s ease-in-out infinite; }
        @keyframes pulse-new { 0%,100% { opacity:1; } 50% { opacity:0; } }

        /* 更新履歴テーブル */
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .history-table th { background: var(--btn-bg); padding: 7px 10px; text-align: left; border-bottom: 2px solid var(--primary); }
        .history-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
        .history-table tr:hover td { background: var(--btn-bg); }
        .history-date { color: #64748b; white-space: nowrap; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; background: var(--header-bg); z-index: 2000; padding: 20px; transition: 0.3s; width: 240px; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
            .sidebar.open { left: 0; }
            #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            #sidebar-overlay.open { display: block; }
        }
    </style>
</head>
<body>
    <!-- ダウンロード中オーバーレイ -->
    <div id="dl-overlay">
        <div class="dl-card">
            <div class="dl-spinner"></div>
            <div>ダウンロード中...</div>
            <div class="dl-filename" id="dl-filename"></div>
        </div>
    </div>

    <!-- ホバープレビューポップアップ -->
    <div id="preview-popup">
        <canvas id="preview-canvas"></canvas>
        <div id="preview-no" class="preview-no" style="display:none;">プレビュー非対応</div>
        <div class="preview-name" id="preview-name"></div>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <h3>完成図書DB</h3>
            <input type="text" id="pass" placeholder="Password" autocomplete="new-password" style="-webkit-text-security: disc;">
            <button onclick="login()" style="width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;">ログイン</button>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="main-app" style="display:none;">
        <header>
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <input type="text" id="search-input" placeholder="検索..." oninput="handleSearch()">
            <button class="theme-toggle-btn" onclick="toggleTheme()" id="t-btn">🌙</button>
        </header>
        <div class="container">
            <aside class="sidebar" id="sidebar">
                <div id="side-fav-container" style="display:none; margin-bottom:20px;">
                    <div style="font-weight:bold; color:#f59e0b; margin-bottom:10px; font-size:0.9rem;">★ お気に入り</div>
                    <div id="side-fav-nav"></div>
                </div>
                <div style="font-weight:bold; color:var(--primary); margin-bottom:15px; font-size:0.9rem;">カテゴリー</div>
                <div id="side-nav"></div>
                <div style="border-top:1px solid var(--border); margin:10px 0;"></div>
                <div class="nav-item" onclick="showHistory()" id="nav-history">
                    <span>📋 更新履歴</span>
                </div>
                <div class="help-section">
                    <div class="help-title">📖 使い方</div>
                    <div class="help-text">
                        <b>・絞り込み：</b>検索窓に文字入力<br>
                        <b>・お気に入り：</b>★をタップして固定<br>
                        <b>・閲覧：</b>PDFは別タブ、CADは保存<br>
                        <b>・プレビュー：</b>ファイル名にカーソルを当てる（PDFのみ）<br>
                        <b>・モード切替：</b>右上の ☀️/🌙 ボタン
                    </div>
                </div>
            </aside>
            <main class="main-content">
                <div id="fav-section" style="display:none; margin-bottom:20px; padding:15px; border:2px dashed #f59e0b; border-radius:10px; background:rgba(245,158,11,0.05);">
                    <div style="font-weight:bold; color:#f59e0b; margin-bottom:8px;">★ お気に入り（クイックアクセス）</div>
                    <div id="fav-list" class="file-list"></div>
                </div>
                <div id="data-area"></div>
            </main>
        </div>
    </div>

    <script>
        const allFiles = {{JSON_DATA}};
        let favorites = JSON.parse(localStorage.getItem('sanix_favs') || '[]');

        function login() {
            const p = document.getElementById('pass').value;
            if(p === "{{PASSWORD}}") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                render(allFiles);
            } else {
                alert("パスワードが違います");
                document.getElementById('pass').value = "";
            }
        }

        // Enterキー
        document.getElementById('pass').addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });

        // 入力時に動的にタイプを変更する（さらなる保険）
        const passInput = document.getElementById('pass');
        passInput.addEventListener('input', function() {
            this.style.webkitTextSecurity = 'disc';
        });

        function render(data) {
            const area = document.getElementById('data-area'), nav = document.getElementById('side-nav'), fList = document.getElementById('fav-list'), fSec = document.getElementById('fav-section'), sFavNav = document.getElementById('side-fav-nav'), sFavCont = document.getElementById('side-fav-container');
            area.innerHTML = ''; nav.innerHTML = ''; fList.innerHTML = ''; sFavNav.innerHTML = '';
            const fvs = allFiles.filter(f => favorites.includes(f.path));
            if(fvs.length > 0) {
                fSec.style.display = 'block'; sFavCont.style.display = 'block';
                fvs.forEach(f => {
                    fList.appendChild(item(f));
                    const sn = document.createElement('div'); sn.className = 'nav-item side-fav-item'; sn.innerText = f.name;
                    sn.onclick = () => { downloadFile(f.path, f.name); };
                    sFavNav.appendChild(sn);
                });
            } else { fSec.style.display = 'none'; sFavCont.style.display = 'none'; }
            const grp = data.reduce((acc, f) => { if(!acc[f.cat1]) acc[f.cat1] = []; acc[f.cat1].push(f); return acc; }, {});
            Object.keys(grp).sort().forEach((cat, i) => {
                const id = 'sec-'+i;
                let statusHtml = '';
                if(cat.includes("08_作業要領書")) statusHtml = '<span class="nav-status">準備中</span>';
                const isCADCat = cat.includes("07_CAD図面");
                const n = document.createElement('div'); n.className = 'nav-item'; n.innerHTML = `<span>${cat}</span>${statusHtml}`;
                n.onclick = () => { if(!document.getElementById(id)) { render(currentData || allFiles); setTimeout(() => { const el = document.getElementById(id); if(el) window.scrollTo({top: el.offsetTop - 70, behavior:'smooth'}); }, 50); } else { window.scrollTo({top: document.getElementById(id).offsetTop - 70, behavior:'smooth'}); } if(window.innerWidth <= 768) toggleSidebar(); };
                nav.appendChild(n);
                const s = document.createElement('div'); s.id = id; s.className = 'section-card';
                s.innerHTML = `<h2 style="font-size:1.1rem; border-bottom:2px solid var(--primary); padding-bottom:5px; margin-top:0;">${cat} ${statusHtml}</h2><div class="file-list"></div>`;
                const listDiv = s.querySelector('.file-list');
                grp[cat].forEach(f => { if(f.name) listDiv.appendChild(item(f, isCADCat)); });
                area.appendChild(s);
            });
        }

        // 登録日から10日以内かどうか判定
        function isNew(dateStr) {
            if (!dateStr) return false;
            const parts = dateStr.split('/');
            if (parts.length !== 3) return false;
            const reg = new Date(parts[0], parts[1]-1, parts[2]);
            const diff = (new Date() - reg) / (1000 * 60 * 60 * 24);
            return diff <= 10;
        }

        function item(f, showExt) {
            const nameLower = f.name.toLowerCase();
            const isP = nameLower.endsWith('.pdf');
            const isF = favorites.includes(f.path);
            const d = document.createElement('div');
            d.className = 'file-item';

            // 拡張子バッジ：07_CAD図面カテゴリのみ実際の拡張子を表示、それ以外は PDF/CAD
            let extLabel, extColor;
            if (showExt && !isP) {
                const m = f.name.match(/\.([^.]+)$/);
                extLabel = m ? m[1].toUpperCase() : 'CAD';
                extColor = extLabel === 'JWW' ? '#0ea5e9' : extLabel === 'DWG' ? '#f97316' : extLabel === 'DXF' ? '#8b5cf6' : '#64748b';
            } else {
                extLabel = isP ? 'PDF' : 'CAD';
                extColor = '#64748b';
            }

            let fileLink;
            if (isP) {
                fileLink = `<a href="${f.path}" target="_blank" onmouseenter="showPreview(event,'${f.path}','${f.name}',true)" onmouseleave="hidePreview()">${f.name}</a>`;
            } else {
                fileLink = `<a href="#" onclick="downloadFile('${f.path}', '${f.name}'); return false;" onmouseenter="showPreview(event,'${f.path}','${f.name}',false)" onmouseleave="hidePreview()">${f.name}</a>`;
            }

            const newBadge = isNew(f.date) ? '<span class="badge-new">NEW</span>' : '';

            d.innerHTML = `
                <span onclick="toggleFav(event, '${f.path}')" style="cursor:pointer; color:${isF?'#f59e0b':'#ccc'}; font-size:1.2rem;">★</span>
                <span style="font-size:9px; background:${extColor}; color:white; padding:2px 5px; border-radius:4px; flex-shrink:0;">${extLabel}</span>
                ${newBadge}
                ${fileLink}
            `;
            return d;
        }

        // CADファイルをFetch APIでダウンロード（クロスオリジンのdownload属性問題を回避）
        async function downloadFile(url, filename) {
            if (url === 'javascript:void(0)') return; // 準備中ファイルは無視
            const overlay = document.getElementById('dl-overlay');
            const dlFilename = document.getElementById('dl-filename');
            dlFilename.textContent = filename;
            overlay.classList.add('active');
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            } catch (e) {
                alert(`ダウンロードできませんでした。\n${filename}\n\n(${e.message})`);
            } finally {
                overlay.classList.remove('active');
            }
        }

        // 更新履歴表示
        function showHistory() {
            if(window.innerWidth <= 768) toggleSidebar();
            const area = document.getElementById('data-area');

            // 日付あり・新しい順にソート
            const dated = allFiles
                .filter(f => f.date)
                .sort((a, b) => {
                    const toD = s => { const p=s.split('/'); return new Date(p[0],p[1]-1,p[2]); };
                    return toD(b.date) - toD(a.date);
                });

            // 日付ごとにグループ化
            const byDate = dated.reduce((acc, f) => {
                if (!acc[f.date]) acc[f.date] = [];
                acc[f.date].push(f);
                return acc;
            }, {});

            let rows = '';
            Object.keys(byDate).sort((a,b) => {
                const toD = s => { const p=s.split('/'); return new Date(p[0],p[1]-1,p[2]); };
                return toD(b) - toD(a);
            }).forEach(date => {
                byDate[date].forEach((f, i) => {
                    const newBadge = isNew(f.date) ? '<span class="badge-new" style="margin-right:4px;">NEW</span>' : '';
                    const nameLower = f.name.toLowerCase();
                    const isP = nameLower.endsWith('.pdf');
                    const link = isP
                        ? `<a href="${f.path}" target="_blank" style="color:var(--primary);">${f.name}</a>`
                        : `<a href="#" onclick="downloadFile('${f.path}','${f.name}');return false;" style="color:var(--primary);">${f.name}</a>`;
                    rows += `<tr>
                        <td class="history-date">${i === 0 ? date : ''}</td>
                        <td style="color:#64748b;font-size:0.78rem;">${f.cat1}</td>
                        <td>${newBadge}${link}</td>
                    </tr>`;
                });
            });

            area.innerHTML = `
                <div class="section-card">
                    <h2 style="font-size:1.1rem; border-bottom:2px solid var(--primary); padding-bottom:5px; margin-top:0;">📋 更新履歴</h2>
                    <table class="history-table">
                        <thead><tr><th>登録日</th><th>カテゴリー</th><th>ファイル名</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }

        function toggleFav(e, p) { e.stopPropagation(); const i = favorites.indexOf(p); if(i > -1) favorites.splice(i, 1); else favorites.push(p); localStorage.setItem('sanix_favs', JSON.stringify(favorites)); render(currentData || allFiles); }
        let currentData = null;
        function handleSearch() {
            const qs = document.getElementById('search-input').value.toLowerCase().split(/\s+/).filter(q => q);
            currentData = allFiles.filter(f => { const txt = (f.name + f.cat1).toLowerCase(); return qs.every(q => txt.includes(q)); });
            render(currentData);
        }

        const savedTheme = localStorage.getItem('theme');
        if(savedTheme === 'dark') { document.body.setAttribute('data-theme', 'dark'); document.getElementById('t-btn').innerText = '☀️'; }
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            const btn = document.getElementById('t-btn');
            if(isDark) { document.body.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); btn.innerText = '🌙'; }
            else { document.body.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); btn.innerText = '☀️'; }
        }
        // ==========================================
        // ホバープレビュー（PDF.js使用）
        // ==========================================
        let previewTimeout = null;
        let pdfCache = {};
        let currentRenderTask = null;

        function showPreview(e, path, name, isPdf) {
            clearTimeout(previewTimeout);
            previewTimeout = setTimeout(async () => {
                const popup = document.getElementById('preview-popup');
                const canvas = document.getElementById('preview-canvas');
                const noPreview = document.getElementById('preview-no');
                document.getElementById('preview-name').textContent = name;

                positionPopup(e);
                popup.style.display = 'block';

                if (!isPdf) {
                    canvas.style.display = 'none';
                    noPreview.style.display = 'block';
                    noPreview.textContent = 'プレビュー非対応';
                    return;
                }

                canvas.style.display = 'block';
                noPreview.style.display = 'none';

                try {
                    if (!window.pdfjsLib) {
                        await loadPdfJs();
                    }
                    // パスはすでにエンコード済みのためそのまま使用
                    if (pdfCache[path]) {
                        await renderPage(pdfCache[path], canvas);
                        return;
                    }
                    const pdf = await pdfjsLib.getDocument(path).promise;
                    pdfCache[path] = pdf;
                    await renderPage(pdf, canvas);
                } catch(err) {
                    canvas.style.display = 'none';
                    noPreview.style.display = 'block';
                    noPreview.textContent = '読み込みエラー';
                }
            }, 300);
        }

        function hidePreview() {
            clearTimeout(previewTimeout);
            // 進行中のレンダリングをキャンセル
            if (currentRenderTask) {
                currentRenderTask.cancel();
                currentRenderTask = null;
            }
            document.getElementById('preview-popup').style.display = 'none';
        }

        function positionPopup(e) {
            const popup = document.getElementById('preview-popup');
            const margin = 12;
            let x = e.clientX + margin;
            let y = e.clientY + margin;
            // 画面右端に収まらない場合は左に表示
            if (x + 220 > window.innerWidth) x = e.clientX - 220 - margin;
            // 画面下端に収まらない場合は上に表示
            if (y + 260 > window.innerHeight) y = e.clientY - 260 - margin;
            popup.style.left = x + 'px';
            popup.style.top  = y + 'px';
        }

        document.addEventListener('mousemove', (e) => {
            const popup = document.getElementById('preview-popup');
            if (popup.style.display === 'block') positionPopup(e);
        });

        async function loadPdfJs() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                script.onload = () => {
                    pdfjsLib.GlobalWorkerOptions.workerSrc =
                        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    resolve();
                };
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function renderPage(pdf, canvas) {
            if (currentRenderTask) {
                currentRenderTask.cancel();
                currentRenderTask = null;
            }
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 0.5 });
            canvas.width  = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            currentRenderTask = page.render({ canvasContext: ctx, viewport });
            await currentRenderTask.promise;
            currentRenderTask = null;
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
    </script>
</body>
</html>
