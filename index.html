        .help-text { font-size: 0.75rem; color: #64748b; line-height: 1.6; }

        .section-card { background: var(--header-bg); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }

        let favorites = JSON.parse(localStorage.getItem('sanix_favs') || '[]');

        function login() {
            const p = document.getElementById('pass').value;
            if(p === "sanixskg393290") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                render(allFiles);
            } else {
                alert("パスワードが違います");
                document.getElementById('pass').value = "";
            }
        }

        // Enterキー
        document.getElementById('pass').addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });

        // 入力時に動的にタイプを変更する（さらなる保険）
        const passInput = document.getElementById('pass');
        passInput.addEventListener('input', function() {
            this.style.webkitTextSecurity = 'disc';
        });

        function render(data) {
            const area = document.getElementById('data-area'), nav = document.getElementById('side-nav'), fList = document.getElementById('fav-list'), fSec = document.getElementById('fav-section'), sFavNav = document.getElementById('side-fav-nav'), sFavCont = document.getElementById('side-fav-container');
            area.innerHTML = ''; nav.innerHTML = ''; fList.innerHTML = ''; sFavNav.innerHTML = '';
            const fvs = allFiles.filter(f => favorites.includes(f.path));
            if(fvs.length > 0) {
                fSec.style.display = 'block'; sFavCont.style.display = 'block';
                fvs.forEach(f => {
                    fList.appendChild(item(f));
                    const sn = document.createElement('div'); sn.className = 'nav-item side-fav-item'; sn.innerText = f.name;
                    sn.onclick = () => { downloadFile(f.path, f.name); };
                    sFavNav.appendChild(sn);
                });
            } else { fSec.style.display = 'none'; sFavCont.style.display = 'none'; }
            const grp = data.reduce((acc, f) => { if(!acc[f.cat1]) acc[f.cat1] = []; acc[f.cat1].push(f); return acc; }, {});
            Object.keys(grp).sort().forEach((cat, i) => {
                const id = 'sec-'+i;
                let statusHtml = '';
                if(cat.includes("07_CAD図面")) statusHtml = '<span class="nav-status">工事中</span>';
                if(cat.includes("08_作業要領書")) statusHtml = '<span class="nav-status">準備中</span>';
                const n = document.createElement('div'); n.className = 'nav-item'; n.innerHTML = `<span>${cat}</span>${statusHtml}`;
                n.onclick = () => { window.scrollTo({top: document.getElementById(id).offsetTop - 70, behavior:'smooth'}); if(window.innerWidth <= 768) toggleSidebar(); };
                nav.appendChild(n);
                const s = document.createElement('div'); s.id = id; s.className = 'section-card';
                s.innerHTML = `<h2 style="font-size:1.1rem; border-bottom:2px solid var(--primary); padding-bottom:5px; margin-top:0;">${cat} ${statusHtml}</h2><div class="file-list"></div>`;
                const listDiv = s.querySelector('.file-list');
                grp[cat].forEach(f => { if(f.name) listDiv.appendChild(item(f)); });
                area.appendChild(s);
            });
        }

        function item(f) {
            const isP = f.name.toLowerCase().endsWith('.pdf');

                ${fileLink}
            `;
            return d;
        }

        // CADファイルをFetch APIでダウンロード（クロスオリジンのdownload属性問題を回避）
        async function downloadFile(url, filename) {
            if (url === 'javascript:void(0)') return; // 準備中ファイルは無視
            const overlay = document.getElementById('dl-overlay');
            const dlFilename = document.getElementById('dl-filename');
            dlFilename.textContent = filename;
            overlay.classList.add('active');
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            } catch (e) {
                alert(`ダウンロードできませんでした。\n${filename}\n\n(${e.message})`);
            } finally {
                overlay.classList.remove('active');
            }
        }

        function toggleFav(e, p) { e.stopPropagation(); const i = favorites.indexOf(p); if(i > -1) favorites.splice(i, 1); else favorites.push(p); localStorage.setItem('sanix_favs', JSON.stringify(favorites)); render(currentData || allFiles); }
        let currentData = null;
        function handleSearch() {
            const qs = document.getElementById('search-input').value.toLowerCase().split(/\s+/).filter(q => q);
            currentData = allFiles.filter(f => { const txt = (f.name + f.cat1).toLowerCase(); return qs.every(q => txt.includes(q)); });
            render(currentData);
        }

        const savedTheme = localStorage.getItem('theme');
        if(savedTheme === 'dark') { document.body.setAttribute('data-theme', 'dark'); document.getElementById('t-btn').innerText = '☀️'; }
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            const btn = document.getElementById('t-btn');
            if(isDark) { document.body.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); btn.innerText = '🌙'; }
            else { document.body.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); btn.innerText = '☀️'; }
        }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
    </script>
