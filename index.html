<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>solid-fuel_docs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #22c55e; --bg: #f1f5f9; --header-bg: #ffffff; --text: #1e293b; --border: #cbd5e1; --btn-bg: #e2e8f0; }
        [data-theme="dark"] { --bg: #0f172a; --header-bg: #1e293b; --text: #f1f5f9; --border: #475569; --btn-bg: #334155; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        #login-screen { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; color: white; width: 280px; }
        
        /* 入力欄：自動補完の色（黄色）を消す設定も追加 */
        input#pass { 
            width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: none; 
            text-align: center; font-size: 1.2rem; box-sizing: border-box; outline: none; 
            background: #ffffff !important; color: #000 !important;
            -webkit-text-security: disc; /* 入力文字を黒丸にする（一部ブラウザ用） */
        }

        header { position: sticky; top: 0; background: var(--header-bg); border-bottom: 2px solid var(--primary); padding: 8px 12px; z-index: 1000; display: flex; align-items: center; gap: 10px; box-sizing: border-box; }
        .menu-toggle { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 1rem; flex-shrink: 0; }
        #search-input { flex: 1; min-width: 50px; padding: 8px 15px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text); outline: none; }
        .theme-toggle-btn { background: #f59e0b; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .container { display: flex; max-width: 1400px; margin: 0 auto; padding: 10px; gap: 10px; }
        .sidebar { width: 220px; position: sticky; top: 70px; height: calc(100vh - 80px); overflow-y: auto; flex-shrink: 0; }
        .nav-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; color: #64748b; cursor: pointer; border-radius: 6px; font-size: 0.85rem; margin-bottom: 2px; }
        .nav-item:hover { background: var(--btn-bg); color: var(--primary); }
        .nav-status { font-size: 0.65rem; padding: 2px 6px; background: #e2e8f0; border-radius: 4px; color: #64748b; font-weight: bold; }
        .side-fav-item { color: #f59e0b !important; font-weight: bold; border-left: 3px solid #f59e0b; border-radius: 0 6px 6px 0 !important; margin-bottom: 5px; }

        .help-section { margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border); }
        .help-title { font-weight: bold; color: var(--primary); font-size: 0.9rem; margin-bottom: 8px; }
        .help-text { font-size: 0.75rem; color: #64748b; line-height: 1.6; }

        .main-content { flex: 1; min-width: 0; }
        .section-card { background: var(--header-bg); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .file-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
        .file-item { background: var(--bg); padding: 8px; border-radius: 6px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); }
        .file-item a { text-decoration: none; color: var(--text); font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

        /* ダウンロード中オーバーレイ */
        #dl-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99999; align-items: center; justify-content: center; }
        #dl-overlay.active { display: flex; }
        .dl-card { background: #1e293b; color: white; padding: 30px 40px; border-radius: 12px; text-align: center; }
        .dl-card .dl-filename { font-size: 0.85rem; color: #94a3b8; margin-top: 8px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dl-spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ホバープレビュー */
        #preview-popup { position: fixed; z-index: 9000; pointer-events: none; display: none; background: var(--header-bg); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); padding: 8px; width: 260px; }
        #preview-popup iframe { display: block; width: 244px; height: 180px; border: none; border-radius: 4px; background: #fff; }
        #preview-popup .preview-name { font-size: 0.72rem; color: #64748b; margin-top: 6px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #preview-popup .preview-no { font-size: 0.75rem; color: #94a3b8; text-align: center; padding: 20px 0; }

        /* NEWバッジ */
        .badge-new { font-size: 9px; background: #ef4444; color: white; padding: 2px 5px; border-radius: 4px; font-weight: bold; flex-shrink: 0; animation: pulse-new 1.5s ease-in-out infinite; }
        @keyframes pulse-new { 0%,100% { opacity:1; } 50% { opacity:0; } }

        /* 更新履歴テーブル */
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .history-table th { background: var(--btn-bg); padding: 7px 10px; text-align: left; border-bottom: 2px solid var(--primary); }
        .history-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
        .history-table tr:hover td { background: var(--btn-bg); }
        .history-date { color: #64748b; white-space: nowrap; }

        /* 目次ドロップダウン */
        .toc-btn { background: #0ea5e9; color: white; border: none; padding: 2px 7px; border-radius: 4px; cursor: pointer; font-size: 0.72rem; flex-shrink: 0; white-space: nowrap; }
        .toc-btn:hover { background: #0284c7; }
        .toc-dropdown { display: none; position: fixed; z-index: 8000; background: var(--header-bg); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); padding: 6px 0; min-width: 260px; max-width: 360px; max-height: 320px; overflow-y: auto; }
        .toc-dropdown.open { display: block; }
        .toc-item { padding: 6px 14px; font-size: 0.8rem; cursor: pointer; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid transparent; }
        .toc-item:hover { background: var(--btn-bg); color: var(--primary); border-left-color: var(--primary); }
        .toc-item.level-2 { padding-left: 24px; font-size: 0.75rem; color: #64748b; }
        .toc-item.level-3 { padding-left: 34px; font-size: 0.72rem; color: #94a3b8; }
        .toc-header { padding: 5px 14px 5px; font-size: 0.7rem; color: #94a3b8; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; background: var(--header-bg); z-index: 2000; padding: 20px; transition: 0.3s; width: 240px; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
            .sidebar.open { left: 0; }
            #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            #sidebar-overlay.open { display: block; }
        }
    </style>
</head>

        // 登録日から10日以内かどうか判定
        function isNew(dateStr) {
            if (!dateStr) return false;
            const parts = dateStr.split('/');
            if (parts.length !== 3) return false;
            const reg = new Date(parts[0], parts[1]-1, parts[2]);
            const diff = (new Date() - reg) / (1000 * 60 * 60 * 24);
            return diff <= 10;
        }

        function item(f, showExt) {
            const nameLower = f.name.toLowerCase();
            const isP = nameLower.endsWith('.pdf');
            const isF = favorites.includes(f.path);
            const d = document.createElement('div');
            d.className = 'file-item';

            // 拡張子バッジ：07_CAD図面カテゴリのみ実際の拡張子を表示、それ以外は PDF/CAD
            let extLabel, extColor;
            if (showExt && !isP) {
                const m = f.name.match(/\.([^.]+)$/);
                extLabel = m ? m[1].toUpperCase() : 'CAD';
                extColor = extLabel === 'JWW' ? '#0ea5e9' : extLabel === 'DWG' ? '#f97316' : extLabel === 'DXF' ? '#8b5cf6' : '#64748b';
            } else {
                extLabel = isP ? 'PDF' : 'CAD';
                extColor = '#64748b';

            const noPreview = f.cat1 && f.cat1.includes('06_取扱説明書');

                fileLink = noPreview
                    ? `<a href="${f.path}" target="_blank">${f.name}</a>`
                    : `<a href="${f.path}" target="_blank" onmouseenter="showPreview(event,'${f.path}','${f.name}',true)" onmouseleave="hidePreview()">${f.name}</a>`;
            } else {
                fileLink = `<a href="#" onclick="downloadFile('${f.path}', '${f.name}'); return false;" onmouseenter="showPreview(event,'${f.path}','${f.name}',false)" onmouseleave="hidePreview()">${f.name}</a>`;
            }

            const newBadge = isNew(f.date) ? '<span class="badge-new">NEW</span>' : '';

            const hasToc = isManualsCAT && f.toc && f.toc.length > 0;
            const tocBtn = hasToc

                : '';

                ${fileLink}
                ${tocBtn}
            `;
            return d;

        // CADファイルをFetch APIでダウンロード（クロスオリジンのdownload属性問題を回避）
        async function downloadFile(url, filename) {
            if (url === 'javascript:void(0)') return; // 準備中ファイルは無視
            const overlay = document.getElementById('dl-overlay');
            const dlFilename = document.getElementById('dl-filename');
            dlFilename.textContent = filename;
            overlay.classList.add('active');
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            } catch (e) {
                alert(`ダウンロードできませんでした。\n${filename}\n\n(${e.message})`);
            } finally {
                overlay.classList.remove('active');
            }
        }

        function showHistory() {
            if(window.innerWidth <= 768) toggleSidebar();
            const area = document.getElementById('data-area');

            // 日付あり・新しい順にソート
            const dated = allFiles
                .filter(f => f.date)
                .sort((a, b) => {
                    const toD = s => { const p=s.split('/'); return new Date(p[0],p[1]-1,p[2]); };
                    return toD(b.date) - toD(a.date);
                });

            // 日付ごとにグループ化
            const byDate = dated.reduce((acc, f) => {
                if (!acc[f.date]) acc[f.date] = [];
                acc[f.date].push(f);
                return acc;
            }, {});

            let rows = '';
            Object.keys(byDate).sort((a,b) => {
                const toD = s => { const p=s.split('/'); return new Date(p[0],p[1]-1,p[2]); };
                return toD(b) - toD(a);
            }).forEach(date => {

                    const nameLower = f.name.toLowerCase();

        let currentTocPath = null;

        function toggleToc(e, pdfPath) {
            e.stopPropagation();
            const dropdown = document.getElementById('toc-dropdown');

            // 同じボタンを再クリックしたら閉じる
            if (currentTocPath === pdfPath && dropdown.classList.contains('open')) {
                closeToc();
                return;
            }

            // 対象ファイルのtocデータを取得
            const fileObj = allFiles.find(f => f.path === pdfPath);
            if (!fileObj || !fileObj.toc || fileObj.toc.length === 0) return;

            // ドロップダウンの内容を生成
            const items = fileObj.toc.map(t => {
                const lvClass = t.level >= 3 ? 'level-3' : t.level === 2 ? 'level-2' : '';
                const pageNum = typeof t.page === 'number' ? t.page : parseInt(t.page) || 1;
                const url = `${pdfPath}`;
                return `<div class="toc-item ${lvClass}" onclick="openTocPage('${url}', ${pageNum})">${t.title}<span style="float:right;color:#94a3b8;margin-left:8px;">${pageNum}p</span></div>`;
            }).join('');

            dropdown.innerHTML = `
                <div class="toc-header">📋 ${fileObj.name}</div>
                ${items}
            `;

            // 位置計算（e.targetがボタン内テキストの場合に備えてclosestで取得）
            const btnEl = e.target.closest ? e.target.closest('.toc-btn') || e.target : e.target;
            const rect = btnEl.getBoundingClientRect();
            let top = rect.bottom + 4;
            let left = rect.left;
            if (left + 360 > window.innerWidth) left = window.innerWidth - 370;
            if (top + 320 > window.innerHeight) top = rect.top - 324;
            dropdown.style.top = top + 'px';
            dropdown.style.left = left + 'px';

            dropdown.classList.add('open');
            currentTocPath = pdfPath;
        }

        function openTocPage(pdfPath, pageNum) {
            const root = location.origin + location.pathname.replace(/\/[^/]*$/, '/');
            const pdfUrl = root + pdfPath;
            const viewerUrl = root + 'docs/viewer.html?pdf=' + encodeURIComponent(pdfUrl) + '&page=' + pageNum;
            window.open(viewerUrl, '_blank');
            closeToc();
        }

                const noPreview = document.getElementById('preview-no');
                document.getElementById('preview-name').textContent = name;

                positionPopup(e);
                popup.style.display = 'block';

                if (!isPdf) {
                    iframe.style.display = 'none';
                    noPreview.style.display = 'block';
                    noPreview.textContent = 'プレビュー非対応';
                    return;
                }

                noPreview.style.display = 'none';
                iframe.style.display = 'block';
                // 同じファイルなら再読み込みしない
                if (iframe.dataset.src !== path) {
                    iframe.src = path;
                    iframe.dataset.src = path;
                }
            }, 300);
        }

        function hidePreview() {
            clearTimeout(previewTimeout);
            document.getElementById('preview-popup').style.display = 'none';
        }

        function positionPopup(e) {
            const popup = document.getElementById('preview-popup');
            const margin = 12;
            let x = e.clientX + margin;
            let y = e.clientY + margin;
            if (x + 280 > window.innerWidth)  x = e.clientX - 280 - margin;
            if (y + 220 > window.innerHeight) y = e.clientY - 220 - margin;
            popup.style.left = x + 'px';
            popup.style.top  = y + 'px';
        }

        document.addEventListener('mousemove', (e) => {
            const popup = document.getElementById('preview-popup');
            if (popup.style.display === 'block') positionPopup(e);
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
    </script>
</body>
</html>
